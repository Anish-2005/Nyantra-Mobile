name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate translations
        run: dart run tool/validate_translations.dart

      - name: Audit translation keys
        run: dart run tool/audit_translation_keys.dart --top=20

      - name: Verify formatting
      run: dart format --output=none lib test tool

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage --reporter expanded

      - name: Enforce minimum coverage
        run: dart run tool/check_coverage.dart --min=1
